<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sambrahma Farm – Plot Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg:#0c0e14; --surface:#13151e; --surface2:#1a1d28;
  --border:#252836; --text:#e8eaf0; --muted:#6b7280;
  --accent:#4ade80; --sos:#f87171;
  --plot-default:rgba(30,40,65,0.55);
  --plot-stroke:rgba(100,130,200,0.5);
  --plot-checked:rgba(22,163,74,0.75);
  --plot-sos:rgba(220,38,38,0.8);
  --plot-hover:rgba(60,80,130,0.7);
  --plot-selected:rgba(80,110,180,0.8);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;z-index:10;}
.logo{font-size:16px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;}
.logo span{color:var(--muted);font-weight:400;font-size:11px;margin-left:8px;}
.stats{display:flex;gap:18px;}
.stat{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.stat b{color:var(--text);font-size:13px;display:block;}
.stat.sos b{color:var(--sos);}

.body{display:flex;flex:1;overflow:hidden;}

/* MAP */
.map-container{flex:1;overflow:auto;position:relative;background:#0c0e14;}
.map-wrap{position:relative;display:inline-block;cursor:default;}
.map-wrap img{display:block;}
svg#overlay{position:absolute;top:0;left:0;pointer-events:none;}
svg#overlay .plot-hit{pointer-events:all;cursor:pointer;}

.plot-rect{transition:fill 0.18s,stroke 0.18s,opacity 0.18s;}
.plot-rect.hovered{fill:var(--plot-hover)!important;stroke:rgba(150,180,255,0.9)!important;stroke-width:1.5px!important;}
.plot-rect.selected{stroke:rgba(255,255,255,0.95)!important;stroke-width:1.8px!important;}
.plot-rect.checked{fill:var(--plot-checked)!important;}
.plot-rect.sos-state{fill:var(--plot-sos)!important;animation:pulsesos 1s infinite alternate;}
@keyframes pulsesos{from{opacity:0.8;}to{opacity:1;filter:drop-shadow(0 0 5px rgba(248,113,113,0.9));}}

.plot-lbl{font-family:'JetBrains Mono',monospace;fill:rgba(180,200,240,0.9);pointer-events:none;text-anchor:middle;dominant-baseline:middle;font-weight:500;}
.plot-lbl.checked{fill:#fff;}
.plot-lbl.sos-state{fill:#fff;font-weight:700;}

/* SIDEBAR */
.sidebar{width:260px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;padding:16px;gap:12px;overflow-y:auto;flex-shrink:0;}
.panel-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600;}

.checkin-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px;}
.input-row{display:flex;gap:6px;}
input[type=text]{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:12px;text-transform:uppercase;outline:none;transition:border-color 0.2s;}
input[type=text]::placeholder{color:var(--muted);text-transform:none;}
input[type=text]:focus{border-color:var(--accent);}

button{cursor:pointer;border:none;border-radius:5px;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:7px 12px;transition:all 0.15s;}
.btn-in{background:var(--accent);color:#061008;flex-shrink:0;}
.btn-in:hover{background:#22c55e;}
.btn-out{background:var(--surface2);color:var(--muted);border:1px solid var(--border);width:100%;margin-top:4px;}
.btn-out:hover{border-color:var(--text);color:var(--text);}
.btn-sos{background:var(--sos);color:#fff;width:100%;font-size:13px;letter-spacing:2px;padding:9px;margin-top:4px;}
.btn-sos:hover{background:#ef4444;box-shadow:0 0 14px rgba(248,113,113,0.4);}
.btn-sos.cancel{background:#7f1d1d;border:1px solid var(--sos);}

.sel-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;}
.sel-id{font-size:20px;font-weight:800;color:var(--accent);font-family:'Syne',sans-serif;}
.sel-status{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.sel-status.checked{color:var(--accent);}
.sel-status.sos-state{color:var(--sos);animation:blink 0.7s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

hr.div{border:none;border-top:1px solid var(--border);}

.list{display:flex;flex-direction:column;gap:5px;overflow-y:auto;}
.list-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border-radius:5px;padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;border:1px solid transparent;}
.list-item:hover{border-color:var(--border);}
.list-item .lid{color:var(--accent);font-weight:600;}
.list-item.sos-item .lid{color:var(--sos);}
.list-item .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.list-item.sos-item .dot{background:var(--sos);animation:blink 0.7s infinite;}
.empty{color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;text-align:center;padding:16px 0;}

.legend{display:flex;gap:10px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);}
.leg-dot{width:9px;height:9px;border-radius:2px;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 18px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text);transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.g{border-color:var(--accent);color:var(--accent);}
.toast.r{border-color:var(--sos);color:var(--sos);}

/* zoom controls */
.zoom-ctrl{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:4px;z-index:5;}
.zoom-ctrl button{background:var(--surface);border:1px solid var(--border);color:var(--text);width:30px;height:30px;font-size:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;}
.zoom-ctrl button:hover{background:var(--surface2);border-color:var(--accent);}
</style>
</head>

// ── State ──────────────────────────────────────
const state = {}; // id -> 'checked' | 'sos'
let selected = null;
let scale = 1;

// ── Build SVG overlay ──────────────────────────
function buildOverlay() {
  const img = document.getElementById('mapImg');
  const svg = document.getElementById('overlay');
  const iw = img.naturalWidth || IMG_W;
  const ih = img.naturalHeight || IMG_H;
  const dw = img.width, dh = img.height;
  const sx = dw / iw, sy = dh / ih;

  svg.setAttribute('width', dw);
  svg.setAttribute('height', dh);
  svg.setAttribute('viewBox', `0 0 ${dw} ${dh}`);
  svg.innerHTML = '';

  PLOTS.forEach(p => {
    const x = (p.cx - p.w/2) * sx;
    const y = (p.cy - p.h/2) * sy;
    const w = p.w * sx;
    const h = p.h * sy;
    const fs = Math.max(5, Math.min(9, w * 0.32));

    const g = document.createElementNS('http://www.w3.org/2000/svg','g');

    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', x); rect.setAttribute('y', y);
    rect.setAttribute('width', w); rect.setAttribute('height', h);
    rect.setAttribute('rx', '1.5');
    rect.setAttribute('class', 'plot-rect plot-hit' + getClasses(p.id));
    rect.setAttribute('fill', getFill(p.id));
    rect.setAttribute('stroke', selected===p.id ? 'rgba(255,255,255,0.95)' : 'rgba(100,130,200,0.45)');
    rect.setAttribute('stroke-width', selected===p.id ? 1.5/sx : 0.8/sx);
    rect.setAttribute('data-id', p.id);

    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', x + w/2);
    txt.setAttribute('y', y + h/2 + 0.5);
    txt.setAttribute('font-size', fs);
    txt.setAttribute('class', 'plot-lbl' + getClasses(p.id));
    txt.setAttribute('data-id', p.id);
    txt.textContent = p.id;

    g.addEventListener('click', () => onPlotClick(p.id));
    g.addEventListener('mouseenter', () => { rect.classList.add('hovered'); });
    g.addEventListener('mouseleave', () => { rect.classList.remove('hovered'); });
    g.appendChild(rect); g.appendChild(txt);
    svg.appendChild(g);
  });

  document.getElementById('s-tot').textContent = PLOTS.length;
}

function getClasses(id) {
  if (state[id] === 'sos') return ' sos-state';
  if (state[id] === 'checked') return ' checked';
  if (selected === id) return ' selected';
  return '';
}
function getFill(id) {
  if (state[id] === 'sos') return 'rgba(220,38,38,0.78)';
  if (state[id] === 'checked') return 'rgba(22,163,74,0.72)';
  if (selected === id) return 'rgba(80,110,180,0.72)';
  return 'rgba(20,30,55,0.52)';
}

function onPlotClick(id) {
  selected = id;
  document.getElementById('pinput').value = id;
  updateSelPanel();
  buildOverlay();
}

function updateSelPanel() {
  const id = selected;
  if (!id) { document.getElementById('sel-panel').style.display='none'; return; }
  document.getElementById('sel-panel').style.display='block';
  document.getElementById('sel-id').textContent = id;
  const st = state[id];
  const stEl = document.getElementById('sel-st');
  if (st==='sos') { stEl.textContent='🚨 SOS ACTIVE'; stEl.className='sel-status sos-state'; }
  else if (st==='checked') { stEl.textContent='● Checked In'; stEl.className='sel-status checked'; }
  else { stEl.textContent='○ Available'; stEl.className='sel-status'; }
  const sosBtn = document.getElementById('sos-btn');
  if (st==='sos') { sosBtn.textContent='✕ Cancel SOS'; sosBtn.className='btn-sos cancel'; }
  else { sosBtn.textContent='🚨 SOS'; sosBtn.className='btn-sos'; }
  sosBtn.style.display = st ? 'block' : 'none';
}

function doCheckIn() {
  const id = document.getElementById('pinput').value.trim().toUpperCase();
  if (!id) { toast('Enter a plot number','r'); return; }
  const p = PLOTS.find(x => x.id===id);
  if (!p) { toast(`Plot "${id}" not found`,'r'); return; }
  if (state[id]) { toast(`${id} already checked in`,'r'); selected=id; updateSelPanel(); buildOverlay(); return; }
  state[id] = 'checked';
  selected = id;
  document.getElementById('pinput').value='';
  updateSelPanel(); updateList(); buildOverlay();
  toast(`✓ ${id} checked in`,'g');
}

function doCheckOut() {
  if (!selected || !state[selected]) { toast('Not checked in','r'); return; }
  const id = selected;
  delete state[id];
  toast(`${id} checked out`,'');
  document.getElementById('sel-panel').style.display='none';
  selected=null;
  updateList(); buildOverlay();
}

function doSOS() {
  if (!selected || !state[selected]) return;
  if (state[selected]==='sos') {
    state[selected]='checked';
    toast(`${selected} SOS cancelled`,'');
  } else {
    state[selected]='sos';
    toast(`🚨 SOS for ${selected}!`,'r');
  }
  updateSelPanel(); updateList(); buildOverlay();
}

function updateList() {
  const active = PLOTS.filter(p=>state[p.id]);
  const list = document.getElementById('list');
  document.getElementById('s-in').textContent = active.length;
  document.getElementById('s-sos').textContent = active.filter(p=>state[p.id]==='sos').length;
  if (!active.length) { list.innerHTML='<div class="empty" id="empty-msg">No active check-ins</div>'; return; }
  list.innerHTML = active.map(p=>`
    <div class="list-item ${state[p.id]==='sos'?'sos-item':''}" onclick="onPlotClick('${p.id}')">
      <span class="lid">${p.id}</span>
      <span style="font-size:10px;color:var(--muted)">${state[p.id]==='sos'?'SOS':'In'}</span>
      <div class="dot"></div>
    </div>`).join('');
}

function zoom(f) {
  scale = Math.min(4, Math.max(0.4, scale*f));
  const img = document.getElementById('mapImg');
  img.style.width = (IMG_W * scale) + 'px';
  img.style.height = (IMG_H * scale) + 'px';
  setTimeout(buildOverlay, 10);
}
function resetZoom() {
  scale=1;
  const img=document.getElementById('mapImg');
  img.style.width=''; img.style.height='';
  setTimeout(buildOverlay,10);
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._t); t._t=setTimeout(()=>t.className='toast',2600);
}

// Enter key
document.getElementById('pinput').addEventListener('keydown', e=>{ if(e.key==='Enter') doCheckIn(); });

// Init: wait for image to load
const img = document.getElementById('mapImg');
if (img.complete) buildOverlay();
else img.onload = buildOverlay;
window.addEventListener('resize', buildOverlay);
</script>
